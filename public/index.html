<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Atletix Horse Sales Report</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
[data-theme=light]{--bg:#f4f5f7;--surface:#fff;--surface2:#eef0f4;--border:#dde0e8;--border2:#c9ceda;--text:#101018;--muted:#72758a;--dim:#9aa0b7;--accent:#6842b8;--accent-bg:rgba(104,66,184,.10);--green:#1a9a56;--green-bg:rgba(26,154,86,.10);--amber:#c47a00;--amber-bg:rgba(196,122,0,.10);--red:#cc3333;--red-bg:rgba(204,51,51,.09)}
[data-theme=dark]{--bg:#0c0c0f;--surface:#141418;--surface2:#1c1c22;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);--text:#f0f0f2;--muted:#8888a0;--dim:#55556a;--accent:#b78cff;--accent-bg:rgba(183,140,255,.12);--green:#3ddc84;--green-bg:rgba(61,220,132,.11);--amber:#ffb347;--amber-bg:rgba(255,179,71,.11);--red:#ff6b6b;--red-bg:rgba(255,107,107,.10)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Syne,system-ui,sans-serif}.shell{max-width:1540px;margin:0 auto;padding:26px 18px 70px}.hdr{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;flex-wrap:wrap;border-bottom:1px solid var(--border);padding-bottom:20px;margin-bottom:22px}.hdr h1{font-size:27px;margin:0;font-weight:800;letter-spacing:-.04em}.hdr h1 span{color:var(--accent)}.sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:3px}.ctrl{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.period-box{border:1px solid var(--border2);border-radius:9px;padding:8px 16px;text-align:center;background:var(--surface)}.period-box .wk{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)}.period-box .pd{font-size:13px;font-weight:800}.tabs{display:flex;gap:4px;border:1px solid var(--border2);background:var(--surface2);border-radius:9px;padding:3px}.tab{border:none;background:transparent;color:var(--muted);padding:6px 16px;border-radius:6px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer}.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 5px rgba(0,0,0,.22)}select,.btn,input,textarea{font:12px 'DM Mono',monospace;border:1px solid var(--border2);border-radius:8px;background:var(--surface);color:var(--text)}select{padding:8px 14px;min-width:230px}.btn{padding:8px 14px;cursor:pointer}.btn-primary{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}.notice,.err{padding:14px 16px;border-radius:10px;margin:18px 0;font-family:'DM Mono',monospace;font-size:12px;line-height:1.65}.notice{background:var(--accent-bg);border:1px solid var(--border2);color:var(--accent)}.err{background:var(--red-bg);border:1px solid var(--red);color:var(--red)}.tools{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0 26px}.slbl{font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:700;font-size:12px;margin:24px 0 10px}.badge-count{display:inline-block;margin-left:8px;border:1px solid var(--border2);border-radius:999px;padding:1px 8px;font-size:10px;color:var(--muted);text-transform:none;letter-spacing:0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}.card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:16px}.card.good{background:var(--green-bg);border-color:rgba(26,154,86,.25)}.card.warn{background:var(--amber-bg);border-color:rgba(196,122,0,.25)}.card.final{background:var(--accent-bg);border-color:rgba(104,66,184,.28)}.card .lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.card .val{font-size:24px;font-weight:800;margin:5px 0;letter-spacing:-.03em;word-break:break-word}.card .desc{font-size:11px;color:var(--dim);line-height:1.45}.wide{grid-column:span 2}.pill{display:inline-flex;border-radius:999px;padding:4px 10px;font:700 10px 'DM Mono',monospace;line-height:1.05;white-space:normal;max-width:130px}.pill.reg{background:var(--green-bg);color:var(--green)}.pill.mkt{background:var(--amber-bg);color:var(--amber)}.pill.req{background:var(--amber-bg);color:var(--amber)}.pill.ret{background:var(--red-bg);color:var(--red)}.source{font:10px 'DM Mono',monospace;color:var(--muted);line-height:1.25;margin-top:5px;max-width:150px}.table-wrap{overflow:auto;border:1px solid var(--border);background:var(--surface);border-radius:12px}.tbl{border-collapse:collapse;min-width:1320px;width:100%}.tbl th{position:sticky;top:0;background:var(--surface2);border-bottom:1px solid var(--border);font:700 10px 'DM Mono',monospace;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;padding:10px;text-align:left;white-space:nowrap}.tbl td{border-bottom:1px solid var(--border);padding:10px;vertical-align:top;font-size:12px}.tbl .r{text-align:right;font-family:'DM Mono',monospace;white-space:nowrap}.money{white-space:nowrap}.email{font:10px 'DM Mono',monospace;color:var(--muted);white-space:nowrap}.muted{color:var(--muted)}.mini{font:10px 'DM Mono',monospace;color:var(--muted);line-height:1.35;margin-top:4px}.row-actions{min-width:250px}.choice{padding:5px 9px;margin:0 3px 5px 0;font-size:10px}.choice.active{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}.ship-input{width:125px;padding:7px 9px}.note-input{width:210px;padding:7px 9px}.manual-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-top:28px}.manual-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}.manual-grid input,.manual-grid textarea{width:100%;padding:9px}.manual-grid textarea{min-height:58px}.empty{padding:42px;text-align:center;color:var(--muted);font-family:'DM Mono',monospace;background:var(--surface);border:1px solid var(--border);border-radius:12px}.footer{margin-top:30px;color:var(--muted);font:11px 'DM Mono',monospace}.loading{text-align:center;padding:80px;font-family:'DM Mono',monospace;color:var(--muted)}
@media(max-width:780px){.shell{padding:20px 14px}.hdr h1{font-size:23px}.ctrl,.tabs,select,.btn{width:100%}.tabs{display:grid;grid-template-columns:repeat(3,1fr)}.tab{padding:7px 6px}.period-box{width:100%}.notice{font-size:11px}.grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}.card{padding:12px}.card .lbl{font-size:9px}.card .val{font-size:20px}.card .desc{display:none}.wide{grid-column:1/-1}.tbl,.tbl thead,.tbl tbody,.tbl tr,.tbl td{display:block;min-width:0;width:100%}.tbl thead{display:none}.tbl tr{border-bottom:1px solid var(--border);padding:10px}.tbl td{border:0;padding:6px 0}.tbl td:before{content:attr(data-label);display:block;font:700 9px 'DM Mono',monospace;color:var(--dim);text-transform:uppercase;margin-bottom:2px}.tbl .r{text-align:left}.ship-input,.note-input{width:100%}.row-actions{min-width:0}.table-wrap{overflow:visible}.pill{max-width:100%}}
</style>
</head>
<body>
<div class="shell">
  <div class="hdr">
    <div><h1><span>Atletix Horse</span> Sales Report</h1><div class="sub">Settlement base - Month, Quarter, and H1/H2 Review</div></div>
    <div class="ctrl"><div class="period-box"><div class="wk">period</div><div class="pd" id="periodLabel">Loading</div></div><div class="tabs"><button class="tab" id="tabMonth" onclick="setMode('month')">By Month</button><button class="tab" id="tabQuarter" onclick="setMode('quarter')">By Quarter</button><button class="tab" id="tabHalf" onclick="setMode('half')">H1/H2 Review</button></div><select id="periodSelect" onchange="loadView()"></select><button class="btn btn-primary" onclick="reloadData()">Refresh</button><button class="btn" onclick="toggleTheme()" id="themeBtn">Dark</button></div>
  </div>
  <div id="main" class="loading">Loading latest GitHub data...</div>
</div>
<script>
const DATA_URL='data/report.json';
const LS_MODE='atletix_github_mode_v1';
const LS_PERIOD='atletix_github_period_v1';
const LS_REVIEW='atletix_review_choices_v1';
let report=null, mode=localStorage.getItem(LS_MODE)||'half', rows=[];
function money(n){n=Number(n||0);return '$'+n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}
function num(n){return Number(n||0).toLocaleString();}
function esc(s){return String(s==null?'':s).replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function dateFmt(s){if(!s)return'';const d=new Date(s);return d.toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'});}
function keyOf(r){return r.manual_id||String(r.order_id||'')+'_'+String(r.product||'')+'_'+String(r.quantity||'');}
function yearOf(r){const d=new Date(r.order_date);return d.getFullYear();}
function monthOf(r){const d=new Date(r.order_date);return d.getMonth()+1;}
function qOf(m){return Math.floor((m-1)/3)+1;}
function halfOf(m){return m<=6?'H1':'H2';}
function periodKeyForRow(r){const y=yearOf(r),m=monthOf(r);return {month:`M:${y}:${m}`,quarter:`Q:${y}:${qOf(m)}`,half:`H:${y}:${halfOf(m)}`};}
function toggleTheme(){const cur=document.documentElement.dataset.theme||'light';const next=cur==='dark'?'light':'dark';document.documentElement.dataset.theme=next;localStorage.setItem('theme',next);document.getElementById('themeBtn').textContent=next==='dark'?'Light':'Dark';}
(function(){const t=localStorage.getItem('theme')||'light';document.documentElement.dataset.theme=t;})()
async function loadData(cacheBust=false){try{document.getElementById('main').className='loading';document.getElementById('main').textContent='Loading latest GitHub data...';const res=await fetch(DATA_URL+(cacheBust?'?t='+Date.now():''),{cache:cacheBust?'reload':'default'});if(!res.ok)throw new Error('Could not load data/report.json');report=await res.json();rows=(report.rows||[]).concat(report.manual_defaults||[]);buildPeriodSelect();loadView();}catch(e){document.getElementById('main').className='';document.getElementById('main').innerHTML='<div class="err">'+esc(e.message)+'</div>';}}
function reloadData(){loadData(true);}
function setMode(m){mode=m;localStorage.setItem(LS_MODE,m);buildPeriodSelect();loadView();}
function buildPeriodSelect(){['Month','Quarter','Half'].forEach(x=>document.getElementById('tab'+x).classList.toggle('active',mode===x.toLowerCase().replace('half','half')));document.getElementById('tabHalf').classList.toggle('active',mode==='half');const sel=document.getElementById('periodSelect');const saved=localStorage.getItem(LS_PERIOD)||'';let opts=[];const seen=new Set();const now=new Date();
 rows.forEach(r=>{if(!r.order_date)return;const y=yearOf(r),m=monthOf(r);if(!y||!m)return;if(mode==='month'){const k=`M:${y}:${m}`;if(!seen.has(k)){seen.add(k);opts.push({k,label:new Date(y,m-1,1).toLocaleString(undefined,{month:'long',year:'numeric'}),sort:y*100+m});}} if(mode==='quarter'){const q=qOf(m),k=`Q:${y}:${q}`;if(!seen.has(k)){seen.add(k);opts.push({k,label:`Q${q} ${y}`,sort:y*10+q});}} if(mode==='half'){const h=halfOf(m),k=`H:${y}:${h}`;if(!seen.has(k)){seen.add(k);opts.push({k,label:`${h} ${y} (${h==='H1'?'Jan - Jun':'Jul - Dec'})`,sort:y*10+(h==='H1'?1:2)});}}});
 // Always keep H1/H2 for current year visible in review.
 if(mode==='half'){const cy=now.getFullYear();['H1','H2'].forEach((h,i)=>{const k=`H:${cy}:${h}`;if(!seen.has(k)){seen.add(k);opts.push({k,label:`${h} ${cy} (${h==='H1'?'Jan - Jun':'Jul - Dec'})`,sort:cy*10+i+1});}})}
 opts.sort((a,b)=>b.sort-a.sort);sel.innerHTML=opts.map(o=>`<option value="${o.k}">${o.label}</option>`).join(''); if(opts.find(o=>o.k===saved)) sel.value=saved; else if(mode==='half'){const h1=`H:${now.getFullYear()}:H1`;sel.value=opts.find(o=>o.k===h1)?.k||opts[0]?.k||'';} else sel.value=opts[0]?.k||'';}
function selectedRows(){const k=document.getElementById('periodSelect').value;localStorage.setItem(LS_PERIOD,k);return rows.filter(r=>{const p=periodKeyForRow(r);return p[mode]===k;});}
function periodLabel(){const sel=document.getElementById('periodSelect');return sel.options[sel.selectedIndex]?.textContent||'-';}
function loadView(){if(!report)return;document.getElementById('periodLabel').textContent=periodLabel().split(' (')[0];if(mode==='half')renderReview(); else renderStandard();}
function readReview(){try{return JSON.parse(localStorage.getItem(LS_REVIEW)||'{}')}catch(e){return {}}}
function writeReview(v){localStorage.setItem(LS_REVIEW,JSON.stringify(v));}
function stateFor(r){const all=readReview();const k=keyOf(r);if(!all[k]){all[k]={included:r.type!=='Atletix Request'?true:true,countType:r.type==='Atletix Request'?'request':'regular',shipping:Number(r.manual_shipping||0),note:r.note||'',edits:{}};writeReview(all);}return all[k];}
function setRow(k,patch){const all=readReview();all[k]=Object.assign({},all[k]||{},patch);writeReview(all);renderReview();}
function sectionType(r,st){if(!st.included)return 'excluded'; if(st.countType==='request'||r.type==='Atletix Request')return 'request'; if(r.type==='Marketing / Seeded')return 'marketing'; if(r.type==='Credit / Return')return 'return'; return 'regular';}
function calcReview(){const list=selectedRows();const states=list.map(r=>[r,stateFor(r)]);let totalOrders=new Set(), excludedOrders=[], totalUnits=0, excludedUnits=0, finalCogs=0,cogsExcluded=0,shipping=0;states.forEach(([r,st])=>{totalOrders.add(r.order_id);const qty=Number(st.edits?.quantity??r.quantity??0);const unit=Number(st.edits?.unit_cogs??r.unit_cogs??0);const cogs=qty*unit;totalUnits+=Math.max(qty,0);if(!st.included||st.countType==='request'||r.type==='Atletix Request'){excludedUnits+=Math.max(qty,0);cogsExcluded+=cogs;if(!st.included)excludedOrders.push(r.order_id);} else finalCogs+=cogs;if(st.included)shipping+=Number(st.shipping||0);});return{list,states,totalOrders:totalOrders.size,totalExcluded:new Set(excludedOrders).size,totalUnits,excludedUnits,finalCogs:Math.round(finalCogs*100)/100,cogsExcluded:Math.round(cogsExcluded*100)/100,shipping:Math.round(shipping*100)/100,invoice:Math.round((finalCogs+shipping)*100)/100,excludedOrders:[...new Set(excludedOrders)]};}
function card(label,val,desc,cls=''){return `<div class="card ${cls}"><div class="lbl">${esc(label)}</div><div class="val">${esc(val)}</div><div class="desc">${esc(desc)}</div></div>`}
function renderReview(){const c=calcReview();const label=periodLabel().split(' (')[0];let html=`<div class="notice"><b>${esc(label)}</b> · Review by category. Add manual Atletix requests for inventory reconciliation. Use Atletix Request when product COGS / COX should be removed and only shipping should apply.</div><div class="tools"><button class="btn" onclick="clearReview()">Clear Review Choices</button><button class="btn" onclick="downloadCsv()">Download CSV</button></div>`;
const loaded=(c.states.filter(([r,st])=>st.countType==='request'&&st.included&&Number(st.shipping||0)>0).map(([r,st])=>`${r.customer} · ${r.order_id}: ${money(st.shipping)}`).join(' | ')); if(loaded) html+=`<div class="card wide"><b>Atletix-paid shipping details loaded:</b> ${esc(loaded)}</div>`;
html+=`<div class="slbl">${esc(label)} Totals</div><div class="grid">${card('Total Orders for Period',num(c.totalOrders),'All Atletix orders found in the selected period.','good')}${card('Total Orders Excluded',num(c.totalExcluded),'Orders unchecked and removed from this review.','warn')}${card('Total Units Sold',num(c.totalUnits),'Total units sold in the selected period.','good')}${card('Excluded / Atletix Request Units',num(c.excludedUnits),'Units removed from product COGS / COX: unchecked rows plus Atletix Request rows.','warn')}${card('Final COGS / COX',money(c.finalCogs),'Total COGS / COX after excluded/requested units are removed.','final')}${card('COGS Excluded',money(c.cogsExcluded),'Product COGS / COX excluded for removed or Atletix Request rows.','warn')}${card('Total Shipping Charges',money(c.shipping),'Manual shipping entered for this review.','final')}${card('Final Invoice Due',money(c.invoice),'COGS / COX plus shipping charges.','final')}${card('Excluded Orders',c.excludedOrders.length?c.excludedOrders.join(', '):'None','Orders removed from this review.','wide')}</div>`;
html+=manualForm();
html+=section('Regular / Commercial Orders',c.states.filter(([r,st])=>sectionType(r,st)==='regular'));
html+=section('Marketing / Seeded Orders',c.states.filter(([r,st])=>sectionType(r,st)==='marketing'));
html+=section('Atletix Requests / Shipping Only',c.states.filter(([r,st])=>sectionType(r,st)==='request'));
html+=section('Excluded Orders',c.states.filter(([r,st])=>sectionType(r,st)==='excluded'));
html+=`<div class="footer">Generated by GitHub Actions: ${esc(report.generated_at||'')} · Refresh reloads the latest generated JSON. Shopify update runs by GitHub Actions schedule/manual workflow.</div>`;
document.getElementById('main').className='';document.getElementById('main').innerHTML=html;}
function pill(r){let cls='reg',label='Commercial'; if(r.type==='Marketing / Seeded'){cls='mkt';label='Marketing / Seeded'} if(r.type==='Atletix Request'){cls='req';label='Atletix Request'} if(r.type==='Credit / Return'){cls='ret';label='Credit / Return'} return `<span class="pill ${cls}">${label}</span><div class="source">Source: ${esc(r.category_source||r.reason||'')}</div>`}
function section(title,arr){return `<div class="slbl">${esc(title)}<span class="badge-count">${arr.length} rows</span></div>${arr.length?table(arr):'<div class="empty">No rows in this section.</div>'}`;}
function table(arr){return `<div class="table-wrap"><table class="tbl"><thead><tr><th>Order #</th><th>Date</th><th>Customer</th><th>Product</th><th>Category</th><th class="r">Qty</th><th class="r">Net</th><th class="r">Unit COGS</th><th class="r">Original COGS</th><th>Include in Totals</th><th>How to Count</th><th>Manual Shipping</th><th>Note</th></tr></thead><tbody>${arr.map(([r,st])=>rowHtml(r,st)).join('')}</tbody></table></div>`}
function rowHtml(r,st){const k=keyOf(r),qty=Number(st.edits?.quantity??r.quantity??0),unit=Number(st.edits?.unit_cogs??r.unit_cogs??0);return `<tr><td data-label="Order #">${esc(r.order_id)}</td><td data-label="Date">${dateFmt(r.order_date)}</td><td data-label="Customer">${esc(st.edits?.customer??r.customer)}<div class="email">${esc(r.customer_email||'')}</div></td><td data-label="Product">${esc(st.edits?.product??r.product)}<div class="mini">${esc(st.edits?.variant??r.variant||'')}</div></td><td data-label="Category">${pill(r)}</td><td data-label="Qty" class="r">${num(qty)}</td><td data-label="Net" class="r money">${money(r.net)}</td><td data-label="Unit COGS" class="r money">${money(unit)}</td><td data-label="Original COGS" class="r money">${money(qty*unit)}</td><td data-label="Include"><label><input type="checkbox" ${st.included?'checked':''} onchange="setRow('${k}',{included:this.checked})"> Add to totals</label><div class="mini">Uncheck to exclude from review totals.</div></td><td data-label="How to Count" class="row-actions"><button class="btn choice ${st.countType!=='request'?'active':''}" onclick="setRow('${k}',{countType:'regular',included:true})">Regular Order</button><button class="btn choice ${st.countType==='request'?'active':''}" onclick="setRow('${k}',{countType:'request',included:true})">Atletix Request</button><div class="mini">Atletix Request = product COGS / COX excluded, shipping only.</div></td><td data-label="Shipping"><input class="ship-input" value="${esc(st.shipping||0)}" onchange="setRow('${k}',{shipping:Number(this.value.replace(',','.'))||0})"></td><td data-label="Note"><input class="note-input" value="${esc(st.note||'')}" onchange="setRow('${k}',{note:this.value})"></td></tr>`}
function manualForm(){return `<div class="manual-box"><div class="slbl" style="margin-top:0">Add / Update Manual Atletix Request</div><div class="manual-grid"><input id="mCustomer" placeholder="Customer" value="Mirko Midili"><input id="mId" placeholder="Manual ID" value="MANUAL-MIRKO-H1-2026"><input id="mQty" placeholder="Qty" value="4"><input id="mUnit" placeholder="Unit COGS / COX" value="89"><input id="mShipping" placeholder="Shipping" value="17.33"><input id="mDate" placeholder="Date YYYY-MM-DD" value="2026-06-30"><textarea id="mNote" placeholder="Address / phone / notes">MIRKO MIDILI | 4412 Las Colinas Ln | Norman, OK 73072 | Phone: +1 580 559 6577</textarea><button class="btn btn-primary" onclick="addManual()">Add / Update Manual Row</button></div></div>`;}
function addManual(){const id=document.getElementById('mId').value.trim()||'MANUAL-'+Date.now();const q=Number(document.getElementById('mQty').value)||0,u=Number(document.getElementById('mUnit').value)||0;const row={manual_id:id,order_id:id,order_date:(document.getElementById('mDate').value||new Date().toISOString().slice(0,10))+'T12:00:00Z',customer:document.getElementById('mCustomer').value||'Manual Atletix Request',customer_email:'',product:'Atletix Horse',variant:'60 Doses',sku:report.config?.sku||'ATLETIX60',quantity:q,gross:0,discount:0,net:0,unit_cogs:u,cogs:q*u,type:'Atletix Request',reason:'Manual Atletix shipment not found in Shopify',category_source:'Manual review entry',manual_shipping:Number(document.getElementById('mShipping').value)||0,note:document.getElementById('mNote').value,is_manual:true};rows=rows.filter(r=>keyOf(r)!==id).concat([row]);const all=readReview();all[id]={included:true,countType:'request',shipping:row.manual_shipping,note:row.note,edits:{customer:row.customer,product:row.product,variant:row.variant,quantity:q,unit_cogs:u}};writeReview(all);buildPeriodSelect();document.getElementById('periodSelect').value=periodKeyForRow(row).half;renderReview();}
function clearReview(){if(confirm('Clear local review choices?')){localStorage.removeItem(LS_REVIEW);renderReview();}}
function renderStandard(){const list=selectedRows();const totalUnits=list.reduce((s,r)=>s+Number(r.quantity||0),0), cogs=list.reduce((s,r)=>s+Number(r.cogs||0),0), net=list.reduce((s,r)=>s+Number(r.net||0),0), gross=list.reduce((s,r)=>s+Number(r.gross||0),0), disc=list.reduce((s,r)=>s+Number(r.discount||0),0);let html=`<div class="slbl">Core KPIs</div><div class="grid">${card('Gross Sales',money(gross),'All Atletix line gross sales.')}${card('Units in Range',num(totalUnits),'Commercial + marketing + credits.')}${card('Net Sales',money(net),'Gross sales minus discounts.')}${card('Number of Orders',num(new Set(list.map(r=>r.order_id)).size),'Unique Atletix orders.')}${card('Discount',money(disc),'Total line discounts.')}${card('COGS',money(cogs),'Qty x unit cost.')}</div>`;html+=section('Commercial Sales',list.filter(r=>r.type==='Commercial').map(r=>[r,stateFor(r)]));html+=section('Marketing Activities / Seeded Units',list.filter(r=>r.type==='Marketing / Seeded').map(r=>[r,stateFor(r)]));html+=section('Atletix Requests / Shipping Only',list.filter(r=>r.type==='Atletix Request').map(r=>[r,stateFor(r)]));document.getElementById('main').className='';document.getElementById('main').innerHTML=html;document.getElementById('periodLabel').textContent=periodLabel();}
function downloadCsv(){const c=calcReview();const lines=[];lines.push(['Metric','Value']);[['Period',periodLabel()],['Generated',report.generated_at],['Total Orders for Period',c.totalOrders],['Total Orders Excluded',c.totalExcluded],['Total Units Sold',c.totalUnits],['Excluded / Atletix Request Units',c.excludedUnits],['Final COGS / COX',c.finalCogs],['COGS Excluded',c.cogsExcluded],['Total Shipping Charges',c.shipping],['Final Invoice Due',c.invoice],['Excluded Orders',c.excludedOrders.join(' | ')]].forEach(x=>lines.push(x));lines.push([]);lines.push(['Order #','Date','Customer','Email','Product','Category','Category Source','Qty','Net','Unit COGS','Original COGS','Included','Count Type','Manual Shipping','Note']);c.states.forEach(([r,st])=>lines.push([r.order_id,dateFmt(r.order_date),st.edits?.customer??r.customer,r.customer_email,st.edits?.product??r.product,r.type,r.category_source||r.reason,st.edits?.quantity??r.quantity,r.net,st.edits?.unit_cogs??r.unit_cogs,(st.edits?.quantity??r.quantity)*(st.edits?.unit_cogs??r.unit_cogs),st.included,st.countType,st.shipping,st.note]));const csv=lines.map(a=>a.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='atletix_'+periodLabel().replace(/[^a-z0-9]+/gi,'_').toLowerCase()+'.csv';a.click();URL.revokeObjectURL(url);}
loadData();
