name: Build Shopify data

on:
  workflow_dispatch:
  schedule:
    # Refresh Shopify data every 2 days at 08:00 UTC.
    - cron: '0 8 */2 * *'

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate report data from Shopify
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          SHOPIFY_API_VERSION: ${{ vars.SHOPIFY_API_VERSION || '2024-01' }}
          ATLETIX_UNIT_COGS: ${{ vars.ATLETIX_UNIT_COGS || '89' }}
          ATLETIX_INITIAL_STOCK: ${{ vars.ATLETIX_INITIAL_STOCK || '100' }}
          ATLETIX_STOCK_RECEIVED_DATE: ${{ vars.ATLETIX_STOCK_RECEIVED_DATE || '2025-12-26' }}
          ATLETIX_SKU: ${{ vars.ATLETIX_SKU || 'ATLETIX60' }}
        run: npm run build:data

      - name: Commit refreshed report JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/report.json public/data/report.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Refresh Atletix Shopify data"
            git push
          fi
